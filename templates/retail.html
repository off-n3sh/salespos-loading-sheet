{% extends "base.html" %}
{% block title %}Retail{% endblock %}
{% block content %}
    <h1 class="text-3xl font-bold mb-6">Retail Sales</h1>
    <button id="add-retail" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 mb-6">Add Retail Sale</button>
    <div id="retail-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center">
        <form method="POST" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
            <h3 class="text-lg font-semibold mb-4">New Retail Sale</h3>
            <input name="item" placeholder="Item" class="p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 mb-2 w-full">
            <input name="price" type="number" step="0.01" placeholder="Price" class="p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 mb-2 w-full">
            <input name="amount" type="number" step="0.01" placeholder="Amount Paid" class="p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 mb-2 w-full">
            <input name="operator" placeholder="Served By" class="p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 mb-2 w-full">
            <div class="flex justify-end">
                <button type="button" id="close-modal" class="mr-2 px-4 py-2 text-gray-600 dark:text-gray-300">Cancel</button>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for sale in retail_sales %}
        <div class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow">
            <h3 class="font-semibold">{{ sale.item }}</h3>
            <p>Price: {{ sale.price }} | Paid: {{ sale.amount }}</p>
            <p>Served by: {{ sale.operator }} | {{ sale.date }}</p>
        </div>
        {% endfor %}
    </div>
{% endblock %}
