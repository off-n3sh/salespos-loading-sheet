{% extends "base.html" %}
{% block title %}Receipts{% endblock %}
{% block content %}
    <h1 class="text-3xl font-bold mb-6">Receipts</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for order in orders %}
        <div class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow flex justify-between items-center">
            <div>
                <h3 class="font-semibold">{{ order.receipt_id }}</h3>
                <p>{{ order.product }} - {{ order.quantity }} units</p>
            </div>
            <a href="{{ url_for('receipt', order_id=order.receipt_id) }}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">View</a>
        </div>
        {% endfor %}
    </div>
{% endblock %}
