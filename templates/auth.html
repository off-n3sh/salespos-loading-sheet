<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamland Enterprises - Login / Signup</title>
    <link href="{{ url_for('static', filename='css/tailwind.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <!-- Same UI as before, skipping for brevity -->
    <div class="flex w-full max-w-4xl shadow-2xl rounded-lg overflow-hidden z-10 relative backdrop-blur-sm bg-white/10">
        <div class="hidden md:flex md:flex-col md:justify-between w-1/2 bg-gradient-to-br from-gray-900/70 to-orange-900/50 p-8 text-white backdrop-blur-sm">
            <!-- Left panel unchanged -->
        </div>
        <div class="w-full md:w-1/2 bg-white p-8 shadow-xl">
            <div class="text-center mb-6">
                <div class="inline-flex rounded-lg p-1 bg-gray-100">
                    <button id="login-tab" class="px-6 py-2 rounded-lg bg-gray-800 text-white font-semibold transition-all duration-300 shadow-md">Login</button>
                    <button id="signup-tab" class="px-6 py-2 text-gray-600 font-semibold transition-all duration-300 hover:bg-gray-200 rounded-lg">Signup</button>
                </div>
            </div>

            <form id="login-form" class="space-y-4 animate-fade-in" action="{{ url_for('login') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                {% if signup_success %}
                    <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-3 rounded animate-slide-in success-message">
                        <p class="text-sm">Signup successful! Please verify your email and log in.</p>
                    </div>
                {% endif %}
                <!-- Login form fields unchanged -->
                <div class="form-group">
                    <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="login-email" name="email" class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-white" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="flex justify-between items-center mb-1">
                        <label for="login-password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" id="forgot-password" class="text-xs text-orange-600 hover:text-orange-700 hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fas fa-lock"></i></span>
                        <input type="password" id="login-password" name="password" class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-white" required>
                        <button type="button" id="toggle-login-password" class="absolute inset-y-0 right-0 px-3 text-gray-600"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-gray-800 text-white py-3 rounded-lg hover:bg-gray-900 transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center justify-center space-x-2 submit-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </form>

            <form id="signup-form" class="space-y-4 hidden animate-fade-in" action="{{ url_for('auth_route') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="form_type" value="signup">
                <!-- Signup form fields unchanged -->
                <!-- ... -->
                <button type="submit" class="w-full bg-gray-800 text-white py-3 rounded-lg hover:bg-gray-900 transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center justify-center space-x-2 submit-btn">
                    <span>Create Account</span>
                    <i class="fas fa-user-plus text-sm"></i>
                </button>
                <p class="text-sm text-center mt-4">Already have an account? <a href="#" id="switch-to-login" class="text-orange-600 hover:text-orange-700 font-medium hover:underline">Login</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Particles.js unchanged
        particlesJS("particles-js", { /* ... */ });

        const loginTab = document.getElementById("login-tab");
        const signupTab = document.getElementById("signup-tab");
        const loginForm = document.getElementById("login-form");
        const signupForm = document.getElementById("signup-form");

        // Tab switching unchanged
        {% if signup_success %}
            loginTab.classList.add("bg-gray-800", "text-white", "shadow-md");
            signupTab.classList.remove("bg-gray-800", "text-white", "shadow-md");
            signupTab.classList.add("text-gray-600");
            loginForm.classList.remove("hidden");
            signupForm.classList.add("hidden");
        {% endif %}
        loginTab.addEventListener("click", () => { /* ... */ });
        signupTab.addEventListener("click", () => { /* ... */ });
        document.getElementById("switch-to-login").addEventListener("click", (e) => { /* ... */ });

        // Password toggle unchanged
        function togglePassword(inputId, toggleBtnId) { /* ... */ }
        togglePassword("login-password", "toggle-login-password");
        togglePassword("signup-password", "toggle-signup-password");
        togglePassword("signup-confirm-password", "toggle-signup-confirm-password");

        // Error/Success display
        function showError(form, message) {
            const existingError = form.querySelector('.error-message');
            const existingSuccess = form.querySelector('.success-message');
            if (existingError) existingError.remove();
            if (existingSuccess) existingSuccess.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded animate-shake error-message';
            errorDiv.innerHTML = `<p class="text-sm">${message}</p>`;
            form.insertBefore(errorDiv, form.firstChild);
            setTimeout(() => errorDiv?.remove(), 5000);
        }

        function showSuccess(form, message) {
            const existingError = form.querySelector('.error-message');
            const existingSuccess = form.querySelector('.success-message');
            if (existingError) existingError.remove();
            if (existingSuccess) existingSuccess.remove();
            const successDiv = document.createElement('div');
            successDiv.className = 'bg-green-100 border-l-4 border-green-500 text-green-700 p-3 rounded animate-slide-in success-message';
            successDiv.innerHTML = `<p class="text-sm">${message}</p>`;
            form.insertBefore(successDiv, form.firstChild);
            setTimeout(() => successDiv?.remove(), 5000);
        }

        // Friendly Firebase errors
        function getFriendlyError(error) {
            switch (error.code) {
                case 'auth/email-already-in-use': return "This email is already taken. Try logging in.";
                case 'auth/invalid-email': return "Invalid email format. Check it out.";
                case 'auth/weak-password': return "Password’s too weak. Make it stronger.";
                case 'auth/wrong-password': return "Wrong password. Try again.";
                case 'auth/user-not-found': return "No account with that email.";
                default: return error.message || "Something went wrong. Try again.";
            }
        }

        // Firebase init with better error handling
        let auth;
        fetch('/firebase-config')
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(`Config fetch failed: ${response.status} - ${text.slice(0, 100)}`);
                    });
                }
                return response.json();
            })
            .then(config => {
                firebase.initializeApp(config);
                auth = firebase.auth();
                setupAuthListeners();
            })
            .catch(error => {
                console.error('Firebase init error:', error);
                showError(loginForm, "Can’t load authentication. Check your connection or try later.");
            });

        function setupAuthListeners() {
            signupForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const submitBtn = signupForm.querySelector('.submit-btn');
                submitBtn.classList.add('processing');
                submitBtn.disabled = true;

                const email = document.getElementById("signup-email").value;
                const password = document.getElementById("signup-password").value;
                const confirmPassword = document.getElementById("signup-confirm-password").value;
                const firstName = document.getElementById("signup-firstname").value;
                const lastName = document.getElementById("signup-lastname").value;
                const phone = document.getElementById("signup-phone").value;
                const role = document.getElementById("signup-role").value;

                if (password !== confirmPassword) {
                    showError(signupForm, "Passwords don’t match.");
                    submitBtn.classList.remove('processing');
                    submitBtn.disabled = false;
                    return;
                }

                auth.createUserWithEmailAndPassword(email, password)
                    .then(userCredential => {
                        const user = userCredential.user;
                        return user.updateProfile({ displayName: `${firstName} ${lastName}` })
                            .then(() => user.sendEmailVerification())
                            .then(() => {
                                const formData = new FormData(signupForm);
                                return fetch(signupForm.action, {
                                    method: 'POST',
                                    body: formData,
                                    headers: { 'X-CSRFToken': formData.get('csrf_token') }
                                });
                            });
                    })
                    .then(response => {
                        if (!response.ok) {
                            return response.text().then(text => {
                                throw new Error(`Server error: ${response.status} - ${text.slice(0, 100)}`);
                            });
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.status === 'success') {
                            showSuccess(signupForm, "Signup successful! Verify your email to log in.");
                            setTimeout(() => loginTab.click(), 2000);
                        } else {
                            throw new Error(data.error || "Failed to save signup data.");
                        }
                    })
                    .catch(error => {
                        console.error('Signup error:', error);
                        showError(signupForm, getFriendlyError(error));
                    })
                    .finally(() => {
                        submitBtn.classList.remove('processing');
                        submitBtn.disabled = false;
                    });
            });

            loginForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const submitBtn = loginForm.querySelector('.submit-btn');
                submitBtn.classList.add('processing');
                submitBtn.disabled = true;

                const email = document.getElementById("login-email").value;
                const password = document.getElementById("login-password").value;

                auth.signInWithEmailAndPassword(email, password)
                    .then(userCredential => {
                        const user = userCredential.user;
                        return user.getIdToken().then(idToken => {
                            const formData = new FormData(loginForm);
                            formData.append('id_token', idToken);
                            return fetch(loginForm.action, {
                                method: 'POST',
                                body: formData,
                                headers: { 'X-CSRFToken': formData.get('csrf_token') }
                            });
                        });
                    })
                    .then(response => {
                        if (!response.ok) {
                            return response.text().then(text => {
                                throw new Error(`Login server error: ${response.status} - ${text.slice(0, 100)}`);
                            });
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.status === 'success') {
                            window.location.href = '/dashboard';
                        } else {
                            throw new Error(data.error || "Login failed on server.");
                        }
                    })
                    .catch(error => {
                        console.error('Login error:', error);
                        showError(loginForm, getFriendlyError(error));
                    })
                    .finally(() => {
                        submitBtn.classList.remove('processing');
                        submitBtn.disabled = false;
                    });
            });

            document.getElementById("forgot-password").addEventListener("click", (e) => {
                e.preventDefault();
                const email = document.getElementById("login-email").value;
                if (!email) {
                    showError(loginForm, "Enter your email to reset your password.");
                    return;
                }
                auth.sendPasswordResetEmail(email)
                    .then(() => showSuccess(loginForm, "Password reset email sent! Check your inbox."))
                    .catch(error => showError(loginForm, getFriendlyError(error)));
            });
        }
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shakeAnimation { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes ripple { to { width: 300%; height: 300%; opacity: 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-fade-in { opacity: 0; animation: fadeIn 0.8s ease-in-out forwards; }
        .animate-fade-in-delay { opacity: 0; animation: fadeIn 0.8s ease-in-out forwards; animation-delay: 0.5s; }
        .animate-shake { animation: shakeAnimation 0.6s ease-in-out; }
        .animate-slide-in { animation: slideIn 0.5s ease-out; }
        .submit-btn.processing {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .submit-btn.processing::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 0.6s linear;
        }
        .submit-btn.processing::before {
            content: '\f1ce';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            display: inline-block;
            margin-right: 0.5rem;
            animation: spin 1s linear infinite;
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</body>
</html>
