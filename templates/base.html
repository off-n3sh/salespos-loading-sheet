<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamland Enterprises - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Font Awesome for icons -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white transition-colors duration-300 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="w-64 bg-gradient-to-b from-orange-600 to-gray-800 shadow-lg p-6 flex flex-col h-full transition-all duration-300 transform -translate-x-full md:translate-x-0">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-white">Dreamland</h1>
                <button id="sidebar-close" class="text-white hover:text-orange-200 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <nav class="flex-1 space-y-4">
                <a href="{{ url_for('dashboard') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-tachometer-alt mr-3"></i> Dashboard
                </a>
                <a href="{{ url_for('orders') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-shopping-cart mr-3"></i> Orders
                </a>
                <a href="{{ url_for('receipts') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-receipt mr-3"></i> Receipts
                </a>
                <a href="{{ url_for('loading_sheets') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-file-alt mr-3"></i> Loading Sheets
                </a>
                <a href="{{ url_for('stock') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-warehouse mr-3"></i> Stock
                </a>
                <a href="{{ url_for('reports') }}" class="flex items-center py-2 px-4 text-gray-200 hover:bg-orange-500 hover:text-white rounded-lg transition-all duration-200 hover:shadow-md">
                    <i class="fas fa-chart-bar mr-3"></i> Reports
                </a>
            </nav>
            <div class="mt-auto space-y-4">
                <button id="theme-toggle" class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600 transition-all duration-200 flex items-center justify-center hover:shadow-md">
                    <i class="fas fa-moon mr-2"></i> Dark Mode
                </button>
                <button id="logout" class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition-all duration-200 flex items-center justify-center hover:shadow-md">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="flex-1 transition-all duration-300">
            <header class="bg-blue-900 text-white p-4 flex items-center justify-between shadow-md">
                <button id="sidebar-toggle" class="text-white hover:text-blue-200 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
                <h1 class="text-2xl font-semibold">Dreamland Enterprises</h1>
                <div class="flex space-x-4">
                    <button id="notifications" class="text-white hover:text-blue-200 focus:outline-none relative">
                        <i class="fas fa-bell w-6 h-6"></i>
                        <span class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">3</span>
                    </button>
                </div>
            </header>
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('main-content').classList.toggle('ml-64');
        });
        document.getElementById('sidebar-close').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('main-content').classList.remove('ml-64');
        });

        // Dark mode toggle (UI only for now)
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    </script>
</body>
</html>
