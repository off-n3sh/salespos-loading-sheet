name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Google Cloud credentials
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        echo "Configuring Docker for region ${{ secrets.GCP_REGION }}"
        gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev"
        # Use quotes to ensure the full string is passed as one argument

    - name: Build Docker image
      run: |
        docker build -t "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/loading-sheet-repo/loading-sheet-app:latest" .

    - name: Push Docker image to Artifact Registry
      run: |
        docker push "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/loading-sheet-repo/loading-sheet-app:latest"

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy loading-sheet-service \
          --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/loading-sheet-repo/loading-sheet-app:latest" \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --min-instances 1
