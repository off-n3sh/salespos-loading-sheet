name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          echo "Configuring Docker for region $REGION"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev"

      - name: Build Docker image
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          PROJECT_ID=$(echo "${{ secrets.GCP_PROJECT_ID }}" | tr -d '\n\r\t ')
          docker build -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/loading-sheet-repo/loading-sheet-app:latest" .

      - name: Push Docker image to Artifact Registry
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          PROJECT_ID=$(echo "${{ secrets.GCP_PROJECT_ID }}" | tr -d '\n\r\t ')
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/loading-sheet-repo/loading-sheet-app:latest"

      - name: Get current revision (before deployment)
        id: get-current-revision
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          CURRENT_REVISION=$(gcloud run services describe loading-sheet-service \
            --region "${REGION}" \
            --platform managed \
            --format 'value(status.traffic[0].revisionName)')
          echo "Current revision: $CURRENT_REVISION"
          echo "CURRENT_REVISION=$CURRENT_REVISION" >> $GITHUB_ENV

      - name: Deploy to Cloud Run without shifting traffic
        id: deploy
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          PROJECT_ID=$(echo "${{ secrets.GCP_PROJECT_ID }}" | tr -d '\n\r\t ')
          gcloud run deploy loading-sheet-service \
            --image "${REGION}-docker.pkg.dev/${PROJECT_ID}/loading-sheet-repo/loading-sheet-app:latest" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --service-account "github-deployer@${PROJECT_ID}.iam.gserviceaccount.com" \
            --no-traffic
          # Get the URL of the deployed service
          SERVICE_URL=$(gcloud run services describe loading-sheet-service \
            --region "${REGION}" \
            --platform managed \
            --format 'value(status.url)')
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Health check for new revision
        id: health-check
        run: |
          echo "Checking health of new revision at ${{ env.SERVICE_URL }}"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SERVICE_URL }}/health" || echo "000")
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed with status $STATUS"
              echo "HEALTH_CHECK_PASSED=true" >> $GITHUB_ENV
              break
            fi
            echo "Health check attempt $i failed with status $STATUS, retrying in 5 seconds..."
            sleep 5
          done
          if [ "${{ env.HEALTH_CHECK_PASSED }}" != "true" ]; then
            echo "Health check failed after 10 attempts"
            echo "HEALTH_CHECK_PASSED=false" >> $GITHUB_ENV
          fi

      - name: Shift traffic to latest revision if health check passes
        if: env.HEALTH_CHECK_PASSED == 'true'
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          gcloud run services update-traffic loading-sheet-service \
            --to-latest \
            --region "${REGION}" \
            --platform managed
          echo "Traffic shifted to the latest revision"

      - name: Roll back traffic to previous revision if health check fails
        if: env.HEALTH_CHECK_PASSED == 'false'
        run: |
          REGION=$(echo "${{ secrets.GCP_REGION }}" | tr -d '\n\r\t ')
          PREVIOUS_REVISION="${{ env.CURRENT_REVISION }}"
          echo "Rolling back to previous revision: $PREVIOUS_REVISION"
          gcloud run services update-traffic loading-sheet-service \
            --to-revisions "${PREVIOUS_REVISION}=100" \
            --region "${REGION}" \
            --platform managed
          echo "Traffic rolled back to $PREVIOUS_REVISION due to health check failure"
